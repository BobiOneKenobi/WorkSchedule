{% extends 'base.html' %}
{% block title %}Edit Employee{% endblock %}
{% block content %}
    <h1>Edit Employee</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Changes</button>
    </form>
    <a href="{% url 'employee-detail' object.pk %}">Cancel</a>
{% endblock %}
