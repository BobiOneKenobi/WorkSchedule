{% extends 'base.html' %}
{% block title %}Add Employee{% endblock %}
{% block content %}
    <h1>Add Employee</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create Employee</button>
    </form>
    <a href="{% url 'employee-list' %}">Cancel</a>
{% endblock %}
