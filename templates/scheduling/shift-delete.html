{% extends 'base.html' %}
{% block title %}Delete Shift{% endblock %}
{% block content %}
    <div class="page-card">
        <h1>Delete Shift</h1>

        <div class="details-box">
            <p>Are you sure you want to delete this shift?</p>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Confirm Delete</button>
            </form>
        </div>

        <div class="action-links" style="margin-top: 20px;">
            <a href="{% url 'shift-detail' shift.pk %}">Cancel</a>
        </div>
    </div>
{% endblock %}
