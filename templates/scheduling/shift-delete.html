{% extends 'base.html' %}
{% block title %}Delete Shift{% endblock %}
{% block content %}
    <h1>Delete Shift</h1>
    <p>Are you sure you want to delete this shift?</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Confirm Delete</button>
    </form>
    <a href="{% url 'shift-detail' shift.pk %}">Cancel</a>
{% endblock %}
